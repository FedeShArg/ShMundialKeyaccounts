    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #1D1D1B;
      --honey:  #F7AF1C;
      --white:  #FFFFFF;
      --gray:   #E6E6E6;
      --dark2:  #383836;
      --dark3:  #555553;
      --error:  #ff4444;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'PPNeueMontreal', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: -0.02em;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEXAGON BACKGROUND ── */
    .hex-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .hex-bg svg {
      width: 100%;
      height: 100%;
    }

    /* ── LOCK SCREEN ── */
    #lock {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.65s ease, visibility 0.65s ease;
    }

    #lock.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* Logo */
    .lock-logo-text {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--honey);
      margin-bottom: 10px;
      line-height: 1;
    }

    /* Label above card */
    .lock-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--honey);
      margin-bottom: 28px;
    }

    /* Card */
    .lock-card {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      border-radius: 4px;
      padding: 44px 48px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .lock-card h2 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .lock-card h2 span {
      color: var(--honey);
    }

    .lock-card p {
      font-size: 0.9rem;
      font-weight: 400;
      line-height: 1.5;
      color: var(--gray);
      margin-top: -6px;
    }

    /* Fields */
    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #959592;
    }

    .field input {
      background: var(--black);
      border: 1px solid var(--dark3);
      border-radius: 3px;
      color: var(--white);
      font-family: 'PPNeueMontreal', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      padding: 13px 15px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .field input::placeholder {
      color: #555553;
    }

    .field input:focus {
      border-color: var(--honey);
    }

    .field input.error-input {
      border-color: var(--error);
    }

    /* CTA */
    .btn-enter {
      margin-top: 4px;
      background: var(--honey);
      color: var(--black);
      border: none;
      border-radius: 3px;
      font-family: 'PPNeueMontreal', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 15px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn-enter:hover { opacity: 0.88; }
    .btn-enter:active { transform: scale(0.985); }

    /* Error */
    .error-msg {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--error);
      text-align: center;
      min-height: 18px;
    }

    /* Footer */
    .lock-footer {
      margin-top: 28px;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #959592;
      text-transform: uppercase;
    }

    /* ── CONTENT FRAME ── */
    #frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 1;
    }

    #frame.visible {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Hex background decoration -->
  <div class="hex-bg" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <!-- Large hex top-right -->
      <polygon points="1220,40 1320,98 1320,214 1220,272 1120,214 1120,98" fill="none" stroke="#F7AF1C" stroke-width="1.5" opacity="0.12"/>
      <polygon points="1270,10 1390,79 1390,217 1270,286 1150,217 1150,79" fill="none" stroke="#F7AF1C" stroke-width="1" opacity="0.07"/>
      <!-- Large hex bottom-left -->
      <polygon points="200,640 310,703 310,829 200,892 90,829 90,703" fill="none" stroke="#F7AF1C" stroke-width="1.5" opacity="0.10"/>
      <polygon points="150,610 280,682 280,826 150,898 20,826 20,682" fill="none" stroke="#F7AF1C" stroke-width="1" opacity="0.06"/>
      <!-- Small accent hex top-left -->
      <polygon points="80,80 120,103 120,149 80,172 40,149 40,103" fill="none" stroke="#F7AF1C" stroke-width="1" opacity="0.13"/>
      <!-- Small accent hex bottom-right -->
      <polygon points="1360,780 1400,803 1400,849 1360,872 1320,849 1320,803" fill="none" stroke="#F7AF1C" stroke-width="1" opacity="0.13"/>
      <!-- Center faint -->
      <polygon points="720,380 780,414 780,482 720,516 660,482 660,414" fill="none" stroke="#F7AF1C" stroke-width="1" opacity="0.04"/>
    </svg>
  </div>

  <!-- LOGIN -->
  <div id="lock">

    <div class="lock-logo-text">(Sh!)</div>

    <div class="lock-eyebrow">Mundial 2026 &middot; Acceso Privado</div>

    <div class="lock-card">
      <h2>Bienvenido</h2>
      <p>Ingresá tus credenciales para ver la presentación.</p>

      <div class="field">
        <label>Usuario</label>
        <input type="text" id="uname" placeholder="usuario" autocomplete="off" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="pwd" placeholder="••••••••••••" />
      </div>

      <div class="error-msg" id="err"></div>

      <button class="btn-enter" onclick="tryLogin()">Ingresar &rarr;</button>
    </div>

    <div class="lock-footer">Confidencial &middot; Solo uso interno</div>
  </div>

  <!-- CONTENT -->
  <iframe id="frame" src=""></iframe>

  <script>
    const CREDENTIALS = [
      { user: 'Coto',      pass: 'Projectmundial2026' },
      { user: 'Carrefour', pass: 'Carrefourmundial2026' },
      { user: 'admin',     pass: 'admin2026' },
      { user: 'Pedidos Ya', pass: 'PeYaMundial2026' }
    ];

    const uInput = document.getElementById('uname');
    const pInput = document.getElementById('pwd');
    const errEl  = document.getElementById('err');
    const lockEl = document.getElementById('lock');
    const frame  = document.getElementById('frame');

    [uInput, pInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
    });

    function tryLogin() {
      const u = uInput.value.trim();
      const p = pInput.value;

      const match = CREDENTIALS.find(c => c.user === u && c.pass === p);

      if (match) {
        errEl.textContent = '';
        uInput.classList.remove('error-input');
        pInput.classList.remove('error-input');

        frame.src = 'sh-pitch-mundial.html';
        frame.classList.add('visible');

        lockEl.classList.add('fade-out');
        setTimeout(() => { lockEl.style.display = 'none'; }, 650);
      } else {
        errEl.textContent = 'Usuario o contraseña incorrectos.';
        uInput.classList.add('error-input');
        pInput.classList.add('error-input');
        pInput.value = '';
        pInput.focus();

        lockEl.querySelector('.lock-card').animate(
          [{ transform:'translateX(0)' },{ transform:'translateX(-8px)' },{ transform:'translateX(8px)' },{ transform:'translateX(-5px)' },{ transform:'translateX(0)' }],
          { duration: 300, easing: 'ease-in-out' }
        );
      }
    }
  </script>

</body>
</html>
